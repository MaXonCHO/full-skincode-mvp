services:
  postgres:
    image: postgres:15-alpine
    container_name: skincode-db
    environment:
      POSTGRES_USER: skincode
      POSTGRES_PASSWORD: skincode_password
      POSTGRES_DB: skincode
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skincode"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skincode-backend
    environment:
      DATABASE_URL: postgresql://skincode:skincode_password@postgres:5432/skincode
      SECRET_KEY: your-secret-key-change-in-production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 5 &&
        python init_db.py &&
        uvicorn main:app --host 0.0.0.0 --port 8000 --reload
      "

  frontend:
    image: nginx:1.27-alpine
    container_name: skincode-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
